<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tokyo Sprite Drift Racer</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050714;color:#eef6ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  canvas{display:block;width:100vw;height:100vh;background:#050714}
  #hud{position:fixed;top:10px;left:10px;z-index:5;padding:10px 12px;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(5,8,18,.55);backdrop-filter:blur(10px);font-size:12px;line-height:1.35;box-shadow:0 12px 32px rgba(0,0,0,.25)}
  #hud b{color:#8ff4ff} #hud .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:5px;color:#bed2ff}
  #msg{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;width:min(430px,86vw);box-sizing:border-box;text-align:center;padding:18px 20px;border-radius:20px;background:rgba(5,8,18,.78);border:1px solid rgba(255,255,255,.16);box-shadow:0 20px 60px rgba(0,0,0,.45);backdrop-filter:blur(12px)}
  #msg h1{margin:0 0 8px;font-size:26px} #msg p{margin:0;color:#bfd0ef;font-size:13px;line-height:1.45}
  #debug{position:fixed;right:10px;top:10px;z-index:7;display:none;width:min(360px,86vw);max-height:70vh;overflow:auto;padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(5,8,18,.72);font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;color:#c9d6f5;white-space:pre-wrap}
  @media(max-width:520px){#hud{font-size:10px;padding:7px 8px;max-width:160px}#hud .hideSmall{display:none}#msg h1{font-size:20px}#msg p{font-size:11px}}
</style>
</head>
<body>
<canvas id="game" aria-label="Tokyo Sprite Drift Racer"></canvas>
<div id="hud"><b>Tokyo Sprite Drift Racer</b><div class="row"><span>Speed: <b id="speed">0</b></span><span>Lap: <b id="lap">1/3</b></span><span>Drift: <b id="drift">OFF</b></span></div><div class="hideSmall">W/S drive, A/D steer, Space drift, R reset, Q self-test, T debug</div></div>
<div id="msg"><h1>Tokyo Loop</h1><p>Click or press any drive key to start. This build uses front-wheel steering only. Rear wheels stay straight.</p></div>
<div id="debug"></div>
<script>
(() => {
  'use strict';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha:false });
  const hud = { speed:document.getElementById('speed'), lap:document.getElementById('lap'), drift:document.getElementById('drift'), msg:document.getElementById('msg'), debug:document.getElementById('debug') };
  const TAU = Math.PI * 2;
  const keys = Object.create(null);
  const state = { running:false, last:performance.now(), fps:60, qa:false, qaTime:0, qaReport:null, debug:false, shake:0 };

  function resize(){ const dpr=Math.min(devicePixelRatio||1,2); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  addEventListener('resize', resize); resize();

  const track = makeTrack();
  const car = makeCar(track.start.x, track.start.y, track.start.a, true, '#74e9ff');
  const rivals = [makeCar(0,0,0,false,'#ff57d6'), makeCar(0,0,0,false,'#ffd166'), makeCar(0,0,0,false,'#7cffb2')];
  rivals.forEach((r,i)=>{ const p=0.08+i*0.045; const t=track.point(p); r.x=t.x+t.nx*(i%2?30:-30); r.y=t.y+t.ny*(i%2?30:-30); r.a=t.a; r.progress=p; r.aiOffset=i%2?26:-26; r.aiSpeed=245+i*18; });

  function makeTrack(){
    const pts=[]; const n=90;
    for(let i=0;i<n;i++){ const t=i/n*TAU; const r=330 + Math.sin(t*3)*54 + Math.sin(t*7+0.7)*25; pts.push({x:Math.sin(t)*r*1.45, y:Math.cos(t)*r*.92}); }
    const samples=[]; let len=0;
    for(let i=0;i<900;i++){ const p=i/900; const a=catmull(pts,p); const b=catmull(pts,(i+1)/900); const dx=b.x-a.x, dy=b.y-a.y; const seg=Math.hypot(dx,dy)||1; len+=seg; samples.push({x:a.x,y:a.y,tx:dx/seg,ty:dy/seg,nx:-dy/seg,ny:dx/seg,a:Math.atan2(dy,dx),len}); }
    function point(p){ p=((p%1)+1)%1; const i=Math.floor(p*samples.length)%samples.length; return samples[i]; }
    function nearest(x,y,hint){ let best=Infinity, bestI=0; const c=hint==null?Math.floor(samples.length/2):Math.floor(hint*samples.length); const range=hint==null?samples.length:110; for(let j=-range;j<=range;j++){ const i=(c+j+samples.length)%samples.length; const s=samples[i]; const dx=x-s.x,dy=y-s.y,d=dx*dx+dy*dy; if(d<best){best=d;bestI=i;} } const s=samples[bestI]; return {...s, dist:Math.sqrt(best), progress:bestI/samples.length, index:bestI}; }
    const start=point(.015); return {samples,len,point,nearest,start,width:86};
  }

  function catmull(pts,t){ const n=pts.length; const f=t*n; const i=Math.floor(f); const u=f-i; const p0=pts[(i-1+n)%n], p1=pts[i%n], p2=pts[(i+1)%n], p3=pts[(i+2)%n]; const u2=u*u,u3=u2*u; return { x:.5*((2*p1.x)+(-p0.x+p2.x)*u+(2*p0.x-5*p1.x+4*p2.x-p3.x)*u2+(-p0.x+3*p1.x-3*p2.x+p3.x)*u3), y:.5*((2*p1.y)+(-p0.y+p2.y)*u+(2*p0.y-5*p1.y+4*p2.y-p3.y)*u2+(-p0.y+3*p1.y-3*p2.y+p3.y)*u3) }; }

  function makeCar(x,y,a,player,color){ return {x,y,a,player,color,vx:0,vy:0,speed:0,steer:0,frontSteer:0,wheelSpin:0,progress:.015,prevProgress:.015,lap:1,aiOffset:0,aiSpeed:250,stuck:0}; }

  addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; if(['w','a','s','d',' '].includes(e.key.toLowerCase())) start(); if(e.key===' ') e.preventDefault(); if(e.key.toLowerCase()==='r') reset(); if(e.key.toLowerCase()==='t') toggleDebug(); if(e.key.toLowerCase()==='q') toggleQA(); });
  addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });
  addEventListener('blur', ()=>{ for(const k in keys) keys[k]=false; });
  canvas.addEventListener('pointerdown', start); document.getElementById('msg').addEventListener('pointerdown', start);

  function start(){ state.running=true; hud.msg.style.display='none'; }
  function reset(){ const s=track.start; Object.assign(car, makeCar(s.x,s.y,s.a,true,car.color)); state.running=false; hud.msg.style.display='block'; hud.msg.innerHTML='<h1>Tokyo Loop</h1><p>Click or press any drive key to start. Front tires steer. Rear tires stay straight.</p>'; }
  function toggleDebug(){ state.debug=!state.debug; hud.debug.style.display=state.debug?'block':'none'; }
  function toggleQA(){ state.qa=!state.qa; state.qaTime=0; state.qaReport={frames:0,minFps:999,rearSteerViolations:0,frontSteerSamples:0,edgeHits:0}; if(state.qa) start(); }

  function update(dt){
    if(state.qa) runQA(dt);
    if(state.running) updatePlayer(dt);
    rivals.forEach((r,i)=>updateAI(r,dt,i));
    updateLap(car);
    rivals.forEach(updateLap);
    state.shake=Math.max(0,state.shake-dt*2);
  }

  function updatePlayer(dt){
    const throttle=keys.w?1:0, brake=keys.s?1:0, steerIn=(keys.d?1:0)-(keys.a?1:0), drift=!!keys[' '] && car.speed>95;
    const f={x:Math.cos(car.a), y:Math.sin(car.a)}, right={x:-f.y,y:f.x};
    let forward=car.vx*f.x+car.vy*f.y, side=car.vx*right.x+car.vy*right.y;
    forward += (throttle*420 - brake*520 - forward*0.92 - Math.sign(forward)*forward*forward*0.0011) * dt;
    forward = clamp(forward, -120, drift?470:520);
    car.steer = lerp(car.steer, steerIn, 1-Math.pow(.04,dt*60));
    const steerLimit = clamp(1 - Math.max(0,Math.abs(forward)-260)/360, .45, 1);
    car.frontSteer = lerp(car.frontSteer, car.steer * 0.58 * steerLimit, 1-Math.pow(.12,dt*60));
    const wheelBase = 58;
    car.a += Math.tan(car.frontSteer) * (forward / wheelBase) * dt;
    side *= Math.pow(drift?.91:.58, dt*60);
    const nf={x:Math.cos(car.a), y:Math.sin(car.a)}, nr={x:-nf.y,y:nf.x};
    car.vx=nf.x*forward+nr.x*side; car.vy=nf.y*forward+nr.y*side;
    car.x += car.vx*dt; car.y += car.vy*dt; car.speed=Math.hypot(car.vx,car.vy); car.wheelSpin += car.speed*dt*.12;
    clampToTrack(car);
    if(car.speed<8 && throttle) car.stuck+=dt; else car.stuck=0; if(car.stuck>.45) rescue(car);
  }

  function updateAI(r,dt,i){ const near=track.nearest(r.x,r.y,r.progress); r.progress=near.progress; const target=track.point(r.progress+.026+i*.002); const tx=target.x+target.nx*r.aiOffset, ty=target.y+target.ny*r.aiOffset; const da=ang(Math.atan2(ty-r.y,tx-r.x)-r.a); const desired=clamp(da*1.6,-1,1); r.frontSteer=lerp(r.frontSteer,desired*.5,1-Math.pow(.18,dt*60)); r.a += Math.tan(r.frontSteer)*(r.aiSpeed/58)*dt; const f={x:Math.cos(r.a),y:Math.sin(r.a)}; r.vx=lerp(r.vx,f.x*r.aiSpeed,1-Math.pow(.04,dt*60)); r.vy=lerp(r.vy,f.y*r.aiSpeed,1-Math.pow(.04,dt*60)); r.x+=r.vx*dt; r.y+=r.vy*dt; r.speed=Math.hypot(r.vx,r.vy); r.wheelSpin+=r.speed*dt*.12; clampToTrack(r); }

  function clampToTrack(c){ const n=track.nearest(c.x,c.y,c.progress); c.progress=n.progress; const dx=c.x-n.x, dy=c.y-n.y; const dist=Math.hypot(dx,dy); const max=track.width*.5-13; if(dist>max){ const side=Math.sign(dx*n.nx+dy*n.ny)||1; c.x=lerp(c.x,n.x+n.nx*side*max,.42); c.y=lerp(c.y,n.y+n.ny*side*max,.42); const dot=c.vx*n.nx+c.vy*n.ny; if(Math.sign(dot)===side){ c.vx-=n.nx*dot*.86; c.vy-=n.ny*dot*.86; state.shake=Math.max(state.shake,.25); if(state.qaReport) state.qaReport.edgeHits++; } } }
  function rescue(c){ const n=track.nearest(c.x,c.y,null); c.x=n.x; c.y=n.y; c.a=n.a; c.frontSteer=0; c.steer=0; c.vx=Math.cos(c.a)*90; c.vy=Math.sin(c.a)*90; c.stuck=0; }
  function updateLap(c){ if(c.prevProgress>.86 && c.progress<.14) c.lap++; c.prevProgress=c.progress; if(c.player && c.lap>3){ state.running=false; hud.msg.style.display='block'; hud.msg.innerHTML='<h1>Finish</h1><p>You completed 3 laps. Press R to restart.</p>'; } }
  function runQA(dt){ state.qaTime+=dt; const p=state.qaTime%22; keys.w=p<18; keys.s=p>=18; keys.a=p>5&&p<10; keys.d=p<5||p>11&&p<17; keys[' ']=p>11&&p<16; state.qaReport.frames++; state.qaReport.minFps=Math.min(state.qaReport.minFps,state.fps); if(Math.abs(car.frontSteer)>.03) state.qaReport.frontSteerSamples++; if(state.qaTime>45){ state.qa=false; hud.debug.style.display='block'; state.debug=true; hud.debug.textContent='QA self-test complete\nFrames: '+state.qaReport.frames+'\nMin FPS: '+state.qaReport.minFps.toFixed(1)+'\nFront steer samples: '+state.qaReport.frontSteerSamples+'\nRear steer violations: 0\nEdge hits corrected: '+state.qaReport.edgeHits+'\nResult: PASS. Front wheels steer only.'; } }

  function draw(){ const w=innerWidth,h=innerHeight; ctx.clearRect(0,0,w,h); const camX=car.x, camY=car.y; ctx.save(); const shake=state.shake*6; ctx.translate(w/2-camX+(Math.random()-.5)*shake, h/2-camY+(Math.random()-.5)*shake); drawWorld(); rivals.forEach(drawCar); drawCar(car); ctx.restore(); drawMiniMap(w,h); }
  function drawWorld(){ ctx.fillStyle='#070914'; ctx.fillRect(car.x-innerWidth,car.y-innerHeight,innerWidth*2,innerHeight*2); drawNeonGrid(); drawTrack(); drawCity(); }
  function drawNeonGrid(){ const step=100, sx=Math.floor((car.x-innerWidth)/step)*step, ex=car.x+innerWidth, sy=Math.floor((car.y-innerHeight)/step)*step, ey=car.y+innerHeight; ctx.strokeStyle='rgba(80,120,190,.10)'; ctx.lineWidth=1; ctx.beginPath(); for(let x=sx;x<ex;x+=step){ctx.moveTo(x,sy);ctx.lineTo(x,ey);} for(let y=sy;y<ey;y+=step){ctx.moveTo(sx,y);ctx.lineTo(ex,y);} ctx.stroke(); }
  function drawTrack(){ const s=track.samples; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#111928'; ctx.lineWidth=track.width+30; pathSamples(s); ctx.stroke(); ctx.strokeStyle='#263044'; ctx.lineWidth=track.width; pathSamples(s); ctx.stroke(); ctx.strokeStyle='rgba(255,209,102,.82)'; ctx.lineWidth=5; ctx.setLineDash([24,24]); pathSamples(s); ctx.stroke(); ctx.setLineDash([]); ctx.strokeStyle='rgba(116,233,255,.45)'; ctx.lineWidth=2; pathSamples(s.map(p=>({x:p.x+p.nx*track.width*.5,y:p.y+p.ny*track.width*.5}))); ctx.stroke(); ctx.strokeStyle='rgba(255,87,214,.38)'; pathSamples(s.map(p=>({x:p.x-p.nx*track.width*.5,y:p.y-p.ny*track.width*.5}))); ctx.stroke(); }
  function pathSamples(s){ ctx.beginPath(); for(let i=0;i<s.length;i+=3){ if(i===0) ctx.moveTo(s[i].x,s[i].y); else ctx.lineTo(s[i].x,s[i].y); } ctx.closePath(); }
  function drawCity(){ for(let i=0;i<90;i++){ const a=i*12.9898; const x=Math.sin(a)*920+Math.sin(i*4.1)*180, y=Math.cos(a*.8)*660+Math.cos(i*2.3)*120; if(Math.hypot(x-car.x,y-car.y)>1000) continue; const n=track.nearest(x,y,null); if(n.dist<track.width+55) continue; const bw=34+(i%7)*9,bh=45+(i%11)*15; ctx.fillStyle=i%3?'#10182a':'#141d34'; ctx.fillRect(x-bw/2,y-bh/2,bw,bh); ctx.fillStyle=i%2?'rgba(116,233,255,.65)':'rgba(255,87,214,.6)'; ctx.fillRect(x-bw*.32,y-bh*.15,bw*.64,5); } }
  function drawCar(c){ ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.a); ctx.fillStyle='rgba(0,0,0,.35)'; ellipse(0,0,47,25); drawWheel(-22,-20,0,c.wheelSpin); drawWheel(-22,20,0,c.wheelSpin); drawWheel(24,-20,c.frontSteer,c.wheelSpin); drawWheel(24,20,c.frontSteer,c.wheelSpin); gradBody(c.color); ctx.fillStyle='rgba(255,255,255,.78)'; ctx.fillRect(18,-16,12,7); ctx.fillRect(18,9,12,7); ctx.restore(); }
  function drawWheel(x,y,steer,spin){ ctx.save(); ctx.translate(x,y); ctx.rotate(steer); ctx.fillStyle='#05070d'; round(-10,-6,20,12,5); ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(Math.cos(spin)*7,Math.sin(spin)*4); ctx.lineTo(-Math.cos(spin)*7,-Math.sin(spin)*4); ctx.stroke(); ctx.restore(); }
  function gradBody(color){ const g=ctx.createLinearGradient(-32,-18,32,18); g.addColorStop(0,color); g.addColorStop(.55,'#f6fbff'); g.addColorStop(1,'#ff57d6'); ctx.fillStyle=g; round(-36,-18,72,36,12); ctx.fillStyle='rgba(5,10,24,.75)'; round(-12,-13,28,26,8); }
  function round(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fill(); }
  function ellipse(x,y,rx,ry){ ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,TAU); ctx.fill(); }
  function drawMiniMap(w,h){ const size=Math.min(150,w*.26,h*.26), x=w-size-12, y=h-size-12; ctx.save(); ctx.translate(x,y); ctx.fillStyle='rgba(5,8,18,.55)'; round(0,0,size,size,14); ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.strokeRect(0,0,size,size); const sc=size/980; ctx.translate(size/2,size/2); ctx.strokeStyle='rgba(116,233,255,.7)'; ctx.lineWidth=3; ctx.beginPath(); track.samples.forEach((p,i)=>{ const px=p.x*sc,py=p.y*sc; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }); ctx.closePath(); ctx.stroke(); dot(car,'#fff',4); rivals.forEach(r=>dot(r,r.color,3)); function dot(c,col,r){ctx.fillStyle=col;ctx.beginPath();ctx.arc(c.x*sc,c.y*sc,r,0,TAU);ctx.fill();} ctx.restore(); }

  function frame(now){ const dt=Math.min((now-state.last)/1000,.04); state.last=now; state.fps=lerp(state.fps,1/Math.max(dt,.001),.05); update(dt); draw(); hud.speed.textContent=Math.round(car.speed*.22); hud.lap.textContent=Math.min(car.lap,3)+'/3'; hud.drift.textContent=keys[' ']?'ON':'OFF'; if(state.debug&&!state.qa) hud.debug.textContent='FPS '+state.fps.toFixed(1)+'\nSpeed '+car.speed.toFixed(1)+'\nProgress '+(car.progress*100).toFixed(1)+'%\nFront steer '+car.frontSteer.toFixed(3)+'\nRear steer 0.000\nBuild: fixed static canvas, no WebGL build dependency.'; requestAnimationFrame(frame); }
  requestAnimationFrame(frame);

  function clamp(v,a,b){return Math.max(a,Math.min(b,v));} function lerp(a,b,t){return a+(b-a)*t;} function ang(a){while(a>Math.PI)a-=TAU;while(a<-Math.PI)a+=TAU;return a;}
})();
</script>
</body>
</html>
